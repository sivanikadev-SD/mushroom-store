<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Mycelium &amp; Co.</title>
  <meta name="description" content="Create your account and start your mushroom growing journey today. Free for 14 days.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍄</text></svg>">
</head>
<body style="min-height:100vh;background:var(--bg-subtle);">
  <div style="position:absolute;top:20px;right:24px;display:flex;gap:8px;z-index:10">
    <button class="icon-btn" onclick="toggleTheme()" style="background:var(--bg-card)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleRTL()" style="background:var(--bg-card)">
      <i class="fa-solid fa-right-left"></i>
    </button>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;">
    <div style="width:100%;max-width:460px">
      <div class="auth-card
      ">
        <a href="../index.html" class="auth-logo">
          <div class="logo-icon"><i class="fa-solid fa-clover"></i></div>
          <span>Mycelium<em style="font-style:italic;color:var(--primary)"> &amp; Co.</em></span>
        </a>
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-sub">Start your mushroom growing journey today. Free for 14 days.</p>
        <div class="auth-social-row">
          <button class="auth-social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="auth-social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
            Apple
          </button>
        </div>
        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <span class="auth-divider-text">or sign up with email</span>
          <div class="auth-divider-line"></div>
        </div>
        <div class="form-group"><label class="form-label">First name</label><input type="text" class="form-input" placeholder="Jane"></div>
        <div class="form-group"><label class="form-label">Last name</label><input type="text" class="form-input" placeholder="Doe"></div>
        <div class="form-group"><label class="form-label">Email address</label><input type="email" class="form-input" placeholder="you@example.com"></div>
        <div class="form-group form-input-icon" style="margin-bottom:20px">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signupPwd" placeholder="Min. 8 characters">
          <button class="form-eye" onclick="togglePwd('signupPwd', this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <a href="dashboard.html" class="btn btn-primary auth-submit" style="display:flex;justify-content:center;">Create Account</a>
        <p style="font-family:var(--font-ui);font-size:11px;color:var(--text-light);text-align:center;margin-top:14px;line-height:1.6">By creating an account, you agree to our <span style="color:var(--primary)">Terms of Service</span> and <span style="color:var(--primary)">Privacy Policy</span>.</p>
        <div class="auth-switch">Already have an account? <a href="login.html">Sign in</a></div>
      </div>
    </div>
  </div>
<script src="../assets/js/main.js"></script>
</body>
</html>
